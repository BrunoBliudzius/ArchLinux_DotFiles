#####################
### LOOK AND FEEL ###
#####################

general {
  gaps_in = 5
  gaps_out = 5
  border_size = 5
  resize_on_border = true
  allow_tearing = false
  layout = master
  col.active_border = rgba(ffffffaa)
  col.inactive_border = rgba(ffffff33)
}

decoration{
   rounding = 8
   rounding_power  = 30
   active_opacity = 0.9
   inactive_opacity = 0.8

   blur {
    enabled = true
    size = 1
    passes = 1
    vibrancy = 0.1696
   }
}

animations {
    enabled = yes

    # Curvas suaves e modernas
    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    bezier = snappy, 0.05, 0.9, 0.1, 1.05
    bezier = softFade, 0.16, 1.0, 0.3, 1.0
    bezier = workspaceMove, 0.2, 0.0, 0.0, 1.0

    # Janelas abrindo
    animation = windows, 1, 7, snappy

    # Janelas fechando
    animation = windowsOut, 1, 7, smooth, popin 80%

    # Bordas
    animation = border, 1, 10, smooth

    # Ângulo da borda
    animation = borderangle, 1, 8, smooth

    # Fade geral
    animation = fade, 1, 7, softFade

    # Workspaces
    animation = workspaces, 1, 6, workspaceMove

    # Workspace especial (scratchpad)
    animation = specialWorkspace, 1, 7, snappy, slidevert
}