##############################
### WINDOWS AND WORKSPACES ###
##############################

# ---------------------------
# Window Rules
# ---------------------------

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = move-hyprland-run
    match:class = ^(hyprland-run)$
    float = true
    move = 20 monitor_h-120
}

# ---------------------------
# Auto Float Rules
# ---------------------------

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol)$
    float = true
    center = true
    size = 900 600
}

windowrule {
    name = float-network-manager
    match:class = ^(nm-connection-editor)$
    float = true
    center = true
}

windowrule {
    name = float-blueman
    match:class = ^(blueman-manager)$
    float = true
    center = true
}

windowrule {
    name = float-file-picker
    match:title = ^(Open File)$
    float = true
    center = true
}

windowrule {
    name = float-auth-dialogs
    match:class = ^(polkit-gnome-authentication-agent-1)$
    float = true
    center = true
}

# ---------------------------
# Workspace Rules
# ---------------------------

windowrule {
    name = firefox-workspace
    match:class = ^(firefox)$
    workspace = 2
}

windowrule {
    name = code-workspace
    match:class = ^(code)$
    workspace = 4
}

# ---------------------------
# Opacity Rules
# ---------------------------

windowrule {
    name = kitty-opacity
    match:class = ^(kitty)$
    opacity = 0.95 0.90
}

windowrule {
    name = firefox-opacity
    match:class = ^(firefox)$
    opacity = 0.98 0.95
}

# ---------------------------
# Dwindle Layout
# ---------------------------

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = false
}

# ---------------------------
# Master Layout
# ---------------------------

master {
    new_status = master
    mfact = 0.55
}

# ---------------------------
# Misc
# ---------------------------

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vfr = true
    vrr = 1
}